<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tags in HTML</title>
</head>
<body>
    <h1>Information Table</h1>
    
    <table border="3">
        <caption style="text-align: center;caption-side: top;">Personal Information</caption>
    <tr>
        <th>Sl/No</th>
        <th>Name</th>
        <th>Age</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Prashant</td>
        <td>22</td>
    </tr>

    <tr>
        <td>2</td>
        <td>Ganesh</td>
        <td>24</td>
    </tr>
    </table>
</body>
</html>
